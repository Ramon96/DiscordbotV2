name: Deploy to VPS

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: vps secrets
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        env:
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
          DISCORD_OLDSCHOOLRUNESCAPECHANNEL_ID: ${{ secrets.DISCORD_OLDSCHOOLRUNESCAPECHANNEL_ID }}
          HANGFIRE_USERNAME: ${{ secrets.HANGFIRE_USERNAME }}
          HANGFIRE_PASSWORD: ${{ secrets.HANGFIRE_PASSWORD }}
          OPENCODE_APIKEY: ${{ secrets.OPENCODE_APIKEY }}
          GH_PAT: ${{ secrets.GH_PAT }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          envs: POSTGRES_PASSWORD,DISCORD_TOKEN,DISCORD_GUILD_ID,DISCORD_OLDSCHOOLRUNESCAPECHANNEL_ID,HANGFIRE_USERNAME,HANGFIRE_PASSWORD,OPENCODE_APIKEY,GH_PAT,UNSPLASH_ACCESS_KEY
          port: 22
          script: |
            cd /root/DiscordbotV2

            git fetch --all
            git reset --hard origin/main
            git pull

            rm -f .env

            echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD" > .env
            echo "DISCORD_TOKEN=$DISCORD_TOKEN" >> .env
            echo "DISCORD_GUILD_ID=$DISCORD_GUILD_ID" >> .env
            echo "DISCORD_OLDSCHOOLRUNESCAPECHANNEL_ID=$DISCORD_OLDSCHOOLRUNESCAPECHANNEL_ID" >> .env
            echo "HANGFIRE_USERNAME=$HANGFIRE_USERNAME" >> .env
            echo "HANGFIRE_PASSWORD=$HANGFIRE_PASSWORD" >> .env
            echo "OPENCODE_APIKEY=$OPENCODE_APIKEY" >> .env
            echo "GITHUB_TOKEN=$GH_PAT" >> .env
            echo "GITHUB_OWNER=ramon96" >> .env
            echo "GITHUB_REPO=DiscordbotV2" >> .env
            echo "UNSPLASH_ACCESS_KEY=$UNSPLASH_ACCESS_KEY" >> .env

            # Don't deploy if a feature is in progress
            if docker exec glados_scheduler pgrep -x opencode > /dev/null 2>&1; then
              echo "opencode is running a feature â€” skipping deploy. Push again when it finishes."
              exit 0
            fi

            docker-compose down
            docker-compose up --build -d

            sleep 10
            if ! docker container ls --format '{{.Names}}' | grep -q glados_scheduler; then
              echo "ERROR: glados_scheduler failed to start. Check logs:"
              docker-compose logs --tail 50
              exit 1
            fi
            echo "Deploy successful."
            docker image prune -f
