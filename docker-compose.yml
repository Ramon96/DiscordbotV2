services:
  postgres:
    image: postgres:16
    container_name: glados_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: glados_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - glados_network

  glados_scheduler:
    image: glados-scheduler:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: final-scheduler
    container_name: glados_scheduler
    depends_on:
      - postgres
    environment:
      - ConnectionStrings__DefaultConnection=Host=postgres;Database=glados_db;Username=postgres;Password=${POSTGRES_PASSWORD}
      - Discord__Token=${DISCORD_TOKEN}
      - Discord__GuildId=${DISCORD_GUILD_ID}
      - Discord__OldschoolRunescapeChannelId=${DISCORD_OLDSCHOOLRUNESCAPECHANNEL_ID}
      - Hangfire__Username=${HANGFIRE_USERNAME}
      - Hangfire__Password=${HANGFIRE_PASSWORD}
      - OpenCode__ApiKey=${OPENCODE_APIKEY}
      - GitHub__Token=${GITHUB_TOKEN}
      - GitHub__Owner=${GITHUB_OWNER}
      - GitHub__Repo=${GITHUB_REPO}
      - Unsplash__AccessKey=${UNSPLASH_ACCESS_KEY}
      - Reddit__ClientId=${REDDIT_CLIENT_ID}
      - Reddit__ClientSecret=${REDDIT_CLIENT_SECRET}
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - OPENCODE_API_KEY=${OPENCODE_APIKEY}
    ports:
      - "8080:8080"
    volumes:
      - /root/DiscordbotV2:/repo:rw
      - /root/DiscordbotV2/.env:/repo/.env:ro
      - /root/DiscordbotV2/docker-compose.yml:/repo/docker-compose.yml:ro
      - /root/DiscordbotV2/Dockerfile:/repo/Dockerfile:ro
      - /root/DiscordbotV2/.github:/repo/.github:ro
    restart: unless-stopped
    networks:
      - glados_network

volumes:
  pgdata:

networks:
  glados_network:
